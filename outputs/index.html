<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ムシポケ</title>
    <style>
      :root {
        --leaf: #9cff1a;
        --leaf-dark: #111111;
        --sky: #14b8ff;
        --sky-soft: #e6f8ff;
        --sun: #ffd400;
        --sun-soft: #fff0a3;
        --coral: #ff4f19;
        --berry: #6e44ff;
        --ink: #111111;
        --soft-ink: #4b4b4b;
        --paper: #ffffff;
        --mist: #f2ffe3;
        --line: #111111;
        --shadow: 8px 9px 0 rgba(17, 17, 17, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family:
          "Hiragino Kaku Gothic StdN",
          "Yu Gothic UI",
          "Yu Gothic",
          "Hiragino Sans",
          "Hiragino Kaku Gothic ProN",
          "Arial Black",
          "Yu Gothic",
          system-ui,
          sans-serif;
        font-weight: 800;
        background:
          linear-gradient(90deg, rgba(17, 17, 17, 0.035) 1px, transparent 1px),
          linear-gradient(0deg, rgba(17, 17, 17, 0.035) 1px, transparent 1px),
          linear-gradient(135deg, #fffdf7 0%, #f4ffe6 48%, #e8f8ff 100%);
        background-size: 22px 22px, 22px 22px, auto;
        overflow-x: hidden;
      }

      body.is-cover {
        overflow-x: hidden;
        background: #ffffff;
      }

      button,
      input {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      button span {
        min-width: 0;
      }

      .no-break {
        display: inline-block;
        white-space: nowrap;
      }

      .app-shell {
        width: min(1120px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 18px clamp(14px, 3vw, 28px) 96px;
      }

      body.is-cover .app-shell {
        width: min(1180px, 100%);
        padding: clamp(12px, 3vw, 32px);
      }

      body.is-cover .topbar,
      body.is-cover .tabbar {
        display: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        grid-template-columns: 58px 1fr 58px;
        align-items: center;
        gap: 12px;
        padding: 10px;
        margin: -2px auto 18px;
        background: rgba(255, 255, 255, 0.96);
        border: 3px solid #111111;
        border-radius: 8px;
        backdrop-filter: blur(12px);
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.12);
      }

      .brand {
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: 1px;
        color: var(--leaf-dark);
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-shadow:
          2px 2px 0 var(--sun),
          -1px -1px 0 #ffffff;
      }

      .icon-button,
      .nav-button,
      .chip,
      .place-button,
      .photo-button,
      .primary-button,
      .ghost-button,
      .thumb-button,
      .date-mode-button,
      .pin-button {
        border: 0;
        cursor: pointer;
        touch-action: manipulation;
      }

      .icon-button {
        display: grid;
        width: 50px;
        height: 50px;
        place-items: center;
        color: var(--leaf-dark);
        background: var(--sun-soft);
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.14);
      }

      .icon-button svg,
      .button-icon svg,
      .tool-icon svg,
      .mini-icon svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .tabbar {
        position: fixed;
        right: max(8px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        left: max(8px, env(safe-area-inset-left));
        z-index: 20;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        max-width: 840px;
        padding: 6px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.96);
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .nav-button {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        place-items: center;
        min-height: 50px;
        padding: 4px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        text-align: center;
      }

      .nav-button .mini-icon {
        position: static;
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        color: #111111;
        background: #ffffff;
        border: 2px solid transparent;
        border-radius: 999px;
      }

      .nav-button .mini-icon svg {
        width: 26px;
        height: 26px;
      }

      .nav-button.is-active {
        color: #111111;
        background: var(--leaf);
        border-color: #111111;
        box-shadow:
          inset 0 -4px 0 var(--sun),
          3px 4px 0 rgba(17, 17, 17, 0.12);
      }

      .nav-button.is-active .mini-icon {
        color: #111111;
        background: #ffffff;
        border-color: #111111;
        box-shadow: 2px 3px 0 rgba(17, 17, 17, 0.16);
      }

      .nav-button.is-active::after {
        position: absolute;
        right: 10px;
        bottom: 6px;
        left: 10px;
        height: 4px;
        content: "";
        background: var(--leaf-dark);
        border-radius: 999px;
      }

      .screen {
        display: grid;
        gap: 22px;
        min-width: 0;
      }

      .cover-screen {
        position: relative;
        display: grid;
        min-height: calc(100vh - clamp(36px, 8vw, 88px));
        place-items: center;
        overflow: hidden;
      }

      .cover-screen::before {
        display: none;
      }

      .cover-book {
        display: grid;
        width: 100%;
        place-items: center;
      }

      .cover-book::before {
        display: none;
      }

      .cover-page {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 18px;
        width: min(100%, 1180px);
        min-height: min(620px, calc(100vh - 58px));
        place-items: center;
      }

      .cover-page::before {
        display: none;
      }

      .cover-head {
        position: relative;
        display: grid;
        place-items: center;
        text-align: center;
        animation: none;
      }

      .cover-head > div {
        display: grid;
        width: 100%;
        place-items: center;
      }

      .cover-title {
        color: var(--leaf-dark);
        font-size: clamp(2.9rem, 12vw, 6.2rem);
        font-weight: 900;
        line-height: 1;
        letter-spacing: 0;
      }

      .cover-logo {
        display: block;
        width: min(88vw, 940px);
        max-height: 62vh;
        object-fit: contain;
        margin-inline: auto;
      }

      .cover-subtitle {
        display: none;
      }

      .cover-note {
        display: none;
        color: var(--soft-ink);
        font-size: clamp(0.98rem, 2vw, 1.15rem);
        font-weight: 800;
        line-height: 1.75;
      }

      .cover-actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        justify-self: center;
        width: fit-content;
        min-width: 0;
        place-items: center;
        margin-inline: auto;
        opacity: 1;
        animation: none;
      }

      .cover-button {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
        width: fit-content;
        min-width: 168px;
        min-height: 58px;
        place-items: center;
        padding: 12px 22px;
        color: #111111;
        background: var(--leaf);
        border: 4px solid #111111;
        border-radius: 8px;
        box-shadow: 7px 8px 0 rgba(17, 17, 17, 0.18);
        cursor: pointer;
        transition:
          transform 160ms ease,
          box-shadow 160ms ease;
      }

      .cover-button.create {
        color: #111111;
        background: var(--sun);
        border-color: #111111;
      }

      .cover-button:active {
        transform: translate(3px, 3px);
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.18);
      }

      .cover-button .button-icon {
        display: none;
      }

      .cover-button > span:not(.button-icon) {
        width: 100%;
        text-align: center;
      }

      .cover-button strong {
        display: block;
        color: inherit;
        font-size: clamp(1.08rem, 4.4vw, 1.38rem);
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
        white-space: nowrap;
      }

      @keyframes titleOnly {
        0%,
        76% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        100% {
          opacity: 0;
          transform: translateY(-8px) scale(0.98);
        }
      }

      @keyframes actionsOnly {
        from {
          opacity: 0;
          transform: translateY(10px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .home-hero {
        display: grid;
        grid-template-columns: minmax(0, 0.95fr) minmax(280px, 1.05fr);
        gap: clamp(18px, 4vw, 34px);
        align-items: start;
        min-height: 0;
      }

      .home-copy {
        display: flex;
        flex-direction: column;
        justify-content: start;
        gap: 16px;
        padding: clamp(4px, 1vw, 10px) 0;
      }

      .kicker {
        width: fit-content;
        padding: 8px 14px;
        color: var(--leaf-dark);
        background: #dff2e6;
        border: 2px solid rgba(47, 122, 79, 0.18);
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 900;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        max-width: 9ch;
        font-size: clamp(2.8rem, 6vw, 4.6rem);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .home-copy p {
        max-width: 24rem;
        color: var(--soft-ink);
        font-size: clamp(1.08rem, 2.4vw, 1.42rem);
        font-weight: 800;
        line-height: 1.55;
      }

      .home-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .mega-button {
        display: grid;
        grid-template-columns: minmax(52px, 70px) 1fr;
        align-items: center;
        gap: clamp(12px, 3vw, 24px);
        min-height: clamp(96px, 12vw, 120px);
        padding: clamp(14px, 3vw, 22px);
        text-align: left;
        color: #102319;
        background: #ffffff;
        border: 3px solid #173023;
        border-radius: 8px;
        box-shadow: 8px 8px 0 rgba(23, 48, 35, 0.18);
        cursor: pointer;
      }

      .mega-button strong {
        display: block;
        font-size: clamp(1.38rem, 3.2vw, 2.05rem);
        line-height: 1.08;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .mega-button span {
        display: block;
        margin-top: 8px;
        color: var(--soft-ink);
        font-size: clamp(0.95rem, 2.8vw, 1.25rem);
        font-weight: 800;
      }

      .mega-button.primary {
        background: #fffbdf;
      }

      .mega-button.create {
        background: #e5f6ff;
      }

      .home-actions .mega-button {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 8px;
        min-height: 138px;
        padding: 12px;
        text-align: center;
      }

      .home-actions .mega-button .button-icon {
        width: 58px;
      }

      .home-actions .mega-button strong {
        font-size: clamp(1.28rem, 2.5vw, 1.78rem);
        white-space: nowrap;
      }

      .home-actions .mega-button span {
        margin-top: 4px;
        font-size: clamp(0.82rem, 1.7vw, 0.96rem);
        line-height: 1.35;
      }

      .button-icon {
        display: grid;
        width: clamp(62px, 12vw, 88px);
        aspect-ratio: 1;
        place-items: center;
        color: var(--leaf-dark);
      }

      .home-specimen {
        display: grid;
        place-items: start center;
        padding: clamp(14px, 3vw, 24px);
        background: linear-gradient(180deg, #eaf7f0, #fef9dc);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 12px 12px 0 rgba(47, 122, 79, 0.16);
      }

      .home-specimen .specimen-card {
        width: min(100%, 520px);
      }

      .home-specimen .photo-frame {
        min-height: clamp(180px, 35vh, 300px);
      }

      .specimen-card {
        display: grid;
        gap: 16px;
        padding: 18px;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 8px;
      }

      .photo-frame {
        position: relative;
        display: grid;
        overflow: hidden;
        min-height: 230px;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(114, 184, 212, 0.14), transparent 44%),
          linear-gradient(45deg, rgba(245, 200, 95, 0.24), transparent 58%),
          #fbfff8;
        border: 2px solid #aecbbb;
        border-radius: 8px;
      }

      .photo-frame::before {
        position: absolute;
        inset: 16px;
        content: "";
        border: 1px dashed rgba(47, 122, 79, 0.28);
        border-radius: 8px;
      }

      .photo-frame svg {
        position: relative;
        z-index: 1;
        width: min(78%, 390px);
        height: auto;
        filter: drop-shadow(0 12px 16px rgba(23, 48, 35, 0.18));
      }

      .photo-frame img {
        position: absolute;
        inset: 0;
        z-index: 1;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .photo-frame img.photo-tip-placeholder {
        object-fit: contain;
        background: #fffdf8;
      }

      .photo-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .specimen-meta {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
      }

      .specimen-name {
        font-size: clamp(1.6rem, 5vw, 2.6rem);
        font-weight: 900;
        letter-spacing: 0;
      }

      .specimen-place {
        display: inline-grid;
        grid-template-columns: 24px auto;
        gap: 6px;
        align-items: center;
        padding: 8px 10px;
        color: var(--leaf-dark);
        background: #e5f6ed;
        border-radius: 8px;
        font-weight: 900;
        white-space: nowrap;
      }

      .section-band {
        display: grid;
        gap: 16px;
        min-width: 0;
        padding: clamp(16px, 3vw, 24px);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 253, 238, 0.96)),
          var(--paper);
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 7px 8px 0 rgba(17, 17, 17, 0.12);
      }

      .section-title {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      .section-title h2 {
        font-size: clamp(1.35rem, 3.8vw, 2rem);
        line-height: 1.15;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .section-title p {
        margin-top: 4px;
        color: var(--soft-ink);
        font-size: 0.95rem;
        font-weight: 800;
      }

      .tool-icon,
      .mini-icon {
        display: grid;
        place-items: center;
        color: var(--leaf);
      }

      .nav-button .mini-icon,
      .chip .mini-icon,
      .place-button .mini-icon,
      .date-mode-button .mini-icon,
      .primary-button .mini-icon,
      .ghost-button .mini-icon,
      .thumb-button .mini-icon {
        width: 30px;
        height: 30px;
      }

      .date-mode-button .mini-icon {
        width: 34px;
        height: 34px;
      }

      .nav-button .mini-icon {
        width: 42px;
        height: 42px;
      }

      .nav-button .mini-icon svg {
        width: 30px;
        height: 30px;
      }

      .photo-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .photo-button {
        display: grid;
        min-height: 118px;
        place-items: center;
        padding: 18px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.13);
      }

      .photo-button .button-icon {
        width: clamp(62px, 10vw, 84px);
      }

      .photo-button .choice-label {
        display: none;
      }

      .label-add-button {
        grid-template-columns: 34px;
        width: 64px;
        padding-inline: 12px;
      }

      .label-add-button .choice-label {
        display: none;
      }

      .label-voice-button.is-recording .mini-icon {
        animation: mic-wiggle 0.34s ease-in-out infinite;
      }

      .label-voice-button.is-recording {
        background: var(--sun);
        border-color: var(--ink);
      }

      .create-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.92fr) minmax(320px, 1.08fr);
        gap: 18px;
        align-items: start;
      }

      .preview-panel {
        display: grid;
        gap: 14px;
      }

      .preview-note {
        display: grid;
        gap: 10px;
        padding: 14px;
        color: var(--soft-ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 800;
        line-height: 1.6;
      }

      .place-grid,
      .filter-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .place-grid {
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        gap: 8px;
      }

      .place-manager {
        display: grid;
        gap: 10px;
      }

      .label-add-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
      }

      .place-area-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
      }

      .place-voice-status {
        min-height: 1.4em;
        color: var(--soft-ink);
        font-weight: 900;
        line-height: 1.4;
      }

      .label-input {
        width: 100%;
        min-height: 58px;
        padding: 10px 12px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: 1.08rem;
        font-weight: 900;
      }

      .place-button,
      .chip {
        display: grid;
        gap: 6px;
        min-height: 76px;
        place-items: center;
        padding: 10px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        line-height: 1.25;
        text-align: center;
      }

      .place-card {
        position: relative;
        display: grid;
        min-width: 0;
      }

      .place-card .place-button {
        min-height: 54px;
        padding: 8px 28px 8px 8px;
        gap: 3px;
        border-width: 2px;
        font-size: 0.82rem;
        line-height: 1.2;
      }

      .place-card-main {
        font-weight: 900;
      }

      .place-card-area {
        color: var(--soft-ink);
        font-size: 0.72rem;
        line-height: 1.25;
      }

      .place-card .place-button .mini-icon {
        width: 20px;
        height: 20px;
      }

      .place-delete-button {
        position: absolute;
        top: 5px;
        right: 5px;
        display: grid;
        width: 22px;
        height: 22px;
        place-items: center;
        color: var(--leaf-dark);
        background: var(--sun-soft);
        border: 2px solid #111111;
        border-radius: 8px;
        cursor: pointer;
      }

      .place-delete-button .mini-icon {
        width: 14px;
        height: 14px;
      }

      .place-grid .empty-state {
        grid-column: 1 / -1;
      }

      .place-button.is-active,
      .chip.is-active {
        color: #111111;
        background: var(--sun);
        border-color: var(--leaf-dark);
        box-shadow: inset 0 -6px 0 var(--leaf);
      }

      .chip {
        grid-template-columns: 28px auto;
        min-height: 58px;
        white-space: normal;
      }

      .chip span:last-child,
      .primary-button span:last-child,
      .ghost-button span:last-child {
        word-break: keep-all;
        overflow-wrap: normal;
      }

      .place-button span:last-child {
        max-width: 100%;
        white-space: normal;
        word-break: normal;
        overflow-wrap: anywhere;
        line-break: anywhere;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .sort-tabs {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .sort-tabs .chip {
        grid-template-columns: 1fr;
        min-height: 48px;
        padding: 8px 4px;
        font-size: clamp(0.82rem, 2.8vw, 1rem);
        line-height: 1.1;
      }

      .sort-tabs .chip span {
        min-width: 0;
        white-space: nowrap;
      }

      .date-grid {
        display: grid;
        grid-template-columns: minmax(0, 0.75fr) minmax(0, 1.25fr);
        gap: 12px;
        align-items: stretch;
        min-width: 0;
      }

      .date-input-wrap {
        display: grid;
        gap: 8px;
        min-width: 0;
        overflow: hidden;
        padding: 14px;
        background: #ffffff;
        border: 3px solid var(--ink);
        border-radius: 8px;
      }

      .date-input-wrap label {
        color: var(--soft-ink);
        font-weight: 900;
      }

      .date-input {
        display: block;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        min-height: 56px;
        padding: 8px 10px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: clamp(0.95rem, 3.2vw, 1.08rem);
        font-weight: 900;
        appearance: none;
        -webkit-appearance: none;
      }

      .date-input::-webkit-date-and-time-value {
        min-width: 0;
        text-align: left;
      }

      .date-input-wrap strong {
        min-width: 0;
        word-break: keep-all;
      }

      .date-modes {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
        gap: 10px;
        min-width: 0;
      }

      .date-mode-button {
        display: grid;
        grid-template-rows: auto auto;
        gap: 6px;
        width: 100%;
        min-height: 78px;
        place-items: center;
        padding: 10px;
        min-width: 0;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        line-height: 1.2;
        text-align: center;
      }

      .date-mode-button span:last-child {
        min-width: 0;
        overflow-wrap: normal;
        word-break: keep-all;
      }

      .date-mode-button.is-active {
        color: #111111;
        background: var(--sun);
        border-color: var(--leaf-dark);
        box-shadow: inset 0 -6px 0 var(--leaf);
      }

      .size-panel {
        display: grid;
        gap: 12px;
      }

      .size-dials {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .size-dial {
        display: grid;
        gap: 8px;
        min-width: 0;
        padding: 12px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
      }

      .size-dial label {
        color: var(--soft-ink);
        font-size: 0.95rem;
        font-weight: 900;
      }

      .size-dial select {
        width: 100%;
        min-height: 58px;
        padding: 8px 36px 8px 12px;
        color: var(--ink);
        background: #fffdf5;
        border: 3px solid var(--leaf-dark);
        border-radius: 8px;
        font-size: clamp(1.25rem, 5vw, 1.65rem);
        font-weight: 900;
        text-align: center;
      }

      .size-voice-row {
        display: grid;
        grid-template-columns: 64px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
      }

      .size-voice-button {
        display: grid;
        width: 64px;
        height: 64px;
        place-items: center;
        color: #ffffff;
        background: #111111;
        border: 3px solid var(--ink);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 4px 5px 0 rgba(23, 48, 35, 0.16);
      }

      .size-voice-button .mini-icon {
        width: 32px;
        height: 32px;
        color: currentColor;
      }

      .size-voice-button.is-recording .mini-icon {
        animation: mic-wiggle 0.34s ease-in-out infinite;
      }

      .size-voice-status {
        min-height: 1.4em;
        color: var(--soft-ink);
        font-weight: 900;
        line-height: 1.45;
      }

      .name-input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 64px;
        gap: 10px;
        align-items: center;
      }

      .name-voice-status {
        min-height: 1.4em;
        color: var(--soft-ink);
        font-weight: 900;
        line-height: 1.45;
      }

      .voice-stage {
        display: grid;
        grid-template-columns: minmax(170px, 240px) minmax(0, 1fr);
        gap: 18px;
        align-items: center;
      }

      .mic-button {
        position: relative;
        display: grid;
        width: min(62vw, 220px);
        aspect-ratio: 1;
        place-items: center;
        margin: 0 auto;
        color: #ffffff;
        background: #111111;
        border: 4px solid var(--ink);
        border-radius: 50%;
        box-shadow: 8px 10px 0 rgba(23, 48, 35, 0.18);
        cursor: pointer;
      }

      .mic-core {
        display: grid;
        width: 54%;
        place-items: center;
      }

      .mic-button svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        stroke-width: 2.4;
        fill: none;
      }

      .mic-button.is-recording .mic-core {
        animation: mic-wiggle 0.34s ease-in-out infinite;
      }

      .wave {
        position: absolute;
        inset: -16px;
        pointer-events: none;
      }

      .wave span {
        position: absolute;
        inset: 0;
        border: 3px solid rgba(238, 123, 99, 0.52);
        border-radius: 50%;
        opacity: 0;
      }

      .mic-button.is-recording .wave span {
        animation: ring 1.3s ease-out infinite;
      }

      .mic-button.is-recording .wave span:nth-child(2) {
        animation-delay: 0.35s;
      }

      .mic-button.is-recording .wave span:nth-child(3) {
        animation-delay: 0.7s;
      }

      @keyframes ring {
        0% {
          opacity: 0.8;
          transform: scale(0.92);
        }
        100% {
          opacity: 0;
          transform: scale(1.26);
        }
      }

      @keyframes mic-wiggle {
        0%,
        100% {
          transform: rotate(-3deg) translateY(0);
        }
        50% {
          transform: rotate(3deg) translateY(-3px);
        }
      }

      .voice-output {
        min-height: 168px;
        padding: 18px;
        background: #ffffff;
        border: 3px solid var(--ink);
        border-radius: 8px;
      }

      .voice-output .label {
        color: var(--soft-ink);
        font-size: 0.95rem;
        font-weight: 900;
      }

      .voice-output .text {
        margin-top: 10px;
        font-size: clamp(1.35rem, 4vw, 2.1rem);
        font-weight: 900;
        line-height: 1.5;
      }

      .primary-button,
      .ghost-button {
        display: inline-grid;
        grid-template-columns: 34px auto;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-height: 64px;
        padding: 12px 18px;
        border-radius: 8px;
        font-size: clamp(1.05rem, 3vw, 1.35rem);
        font-weight: 900;
        text-align: center;
        line-height: 1.2;
      }

      .primary-button {
        color: #111111;
        background: linear-gradient(180deg, #a6eb33, var(--leaf));
        border: 3px solid var(--leaf-dark);
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.18);
      }

      .primary-button .mini-icon,
      .primary-button .tool-icon {
        color: currentColor;
      }

      .primary-button.sun {
        color: var(--ink);
        background: linear-gradient(180deg, #ffe75a, var(--sun));
      }

      .ghost-button {
        color: var(--leaf-dark);
        background: #ffffff;
        border: 3px solid #111111;
        box-shadow: 4px 5px 0 rgba(17, 17, 17, 0.12);
      }

      .list-tools {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1.1fr) auto;
        gap: 14px;
        align-items: end;
      }

      .tool-block {
        display: grid;
        gap: 8px;
      }

      .tool-heading {
        display: grid;
        grid-template-columns: 30px auto;
        gap: 6px;
        align-items: center;
        color: var(--leaf-dark);
        font-weight: 900;
      }

      .bugs-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .zukan-openers {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .zukan-openers .chip {
        grid-template-columns: 1fr;
        min-height: 52px;
        padding: 8px 6px;
        font-size: clamp(0.92rem, 3vw, 1.05rem);
      }

      .zukan-groups {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(112px, 1fr));
        gap: 8px;
      }

      .zukan-group-button {
        display: grid;
        gap: 4px;
        min-height: 62px;
        place-items: center;
        padding: 8px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        line-height: 1.15;
        text-align: center;
        cursor: pointer;
      }

      .zukan-group-button small {
        color: var(--soft-ink);
        font-size: 0.78rem;
      }

      .zukan-group-button.is-active {
        background: var(--sun);
        box-shadow: inset 0 -5px 0 var(--leaf);
      }

      .zukan-heading {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }

      .taxon-info {
        display: grid;
        gap: 8px;
        padding: 12px;
        background: #f2fbff;
        border: 3px solid #111111;
        border-radius: 8px;
      }

      .taxon-info strong {
        font-size: 1.05rem;
      }

      .taxon-info p {
        margin: 0;
        color: var(--soft-ink);
        font-size: 0.95rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .outing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .month-strip {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
        padding: 2px;
        margin: 0 0 12px;
      }

      .month-chip {
        min-width: 0;
        min-height: 42px;
        padding: 8px 10px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: 0.92rem;
        font-weight: 900;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.12);
      }

      .month-chip.is-active {
        background: var(--sun);
        box-shadow:
          inset 0 -4px 0 var(--leaf),
          3px 4px 0 rgba(17, 17, 17, 0.12);
      }

      .month-planner {
        display: grid;
        grid-template-columns: 48px 1fr 48px;
        align-items: center;
        gap: 8px;
        min-width: 0;
        padding: 8px;
        margin: 0 0 10px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 4px 5px 0 rgba(17, 17, 17, 0.12);
      }

      .month-nav-button {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        color: #111111;
        background: var(--sun);
        border: 3px solid #111111;
        border-radius: 8px;
      }

      .month-nav-button svg {
        width: 26px;
        height: 26px;
      }

      .month-planner-title {
        display: grid;
        gap: 2px;
        min-width: 0;
        text-align: center;
      }

      .month-planner-title strong {
        font-size: clamp(1.25rem, 5vw, 1.8rem);
        line-height: 1.05;
      }

      .month-planner-title span {
        color: var(--soft-ink);
        font-size: 0.78rem;
        line-height: 1.25;
      }

      .outing-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.14);
      }

      .outing-card.is-rare {
        background: linear-gradient(135deg, #fff7c2 0%, #ffffff 46%, #dfff78 100%);
      }

      .outing-card h3 {
        font-size: 1.25rem;
        line-height: 1.15;
      }

      .outing-card strong {
        color: #111111;
      }

      .outing-card p {
        margin: 0;
        color: var(--soft-ink);
        font-size: 0.92rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .outing-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .outing-meta span {
        min-width: 0;
        padding: 6px 8px;
        background: #f7fff0;
        border: 2px solid #111111;
        border-radius: 8px;
        font-size: 0.82rem;
        line-height: 1.25;
      }

      .outing-more {
        display: grid;
        gap: 8px;
      }

      .outing-more summary {
        display: grid;
        min-height: 38px;
        place-items: center;
        padding: 6px 8px;
        color: #111111;
        background: var(--sky-soft);
        border: 2px solid #111111;
        border-radius: 8px;
        cursor: pointer;
        list-style: none;
      }

      .outing-more summary::-webkit-details-marker {
        display: none;
      }

      .outing-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .outing-tags span {
        padding: 4px 8px;
        background: var(--sun);
        border: 2px solid #111111;
        border-radius: 999px;
        font-size: 0.8rem;
      }

      .rare-card {
        display: grid;
        gap: 10px;
        overflow: hidden;
        padding: 14px;
        color: #111111;
        background:
          radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.95) 0 7%, transparent 8%),
          linear-gradient(135deg, #fff8c8 0%, #f6c646 34%, #b87910 68%, #ffdf72 100%);
        border: 5px solid #111111;
        border-radius: 10px;
        box-shadow: 9px 10px 0 rgba(17, 17, 17, 0.22);
      }

      .rare-card.has-card-image {
        padding: 0;
        background: transparent;
        border: 0;
        border-radius: 10px;
        box-shadow: none;
      }

      .rare-card.has-card-image .rare-card-title,
      .rare-card.has-card-image > p {
        display: none;
      }

      .rare-card-art {
        display: grid;
        min-height: 150px;
        place-items: center;
        overflow: hidden;
        background: #111111;
        border: 4px solid #ffffff;
        border-radius: 8px;
      }

      .rare-card-art img {
        width: 100%;
        height: 210px;
        object-fit: cover;
        object-position: center;
        display: block;
      }

      .rare-card-art.is-full-card {
        min-height: 0;
        padding: 0;
        background: transparent;
        border: 0;
      }

      .rare-card-art.is-full-card img {
        height: auto;
        max-height: min(78vh, 760px);
        object-fit: contain;
        border-radius: 10px;
      }

      .rare-card-art svg {
        width: min(92%, 300px);
        filter: drop-shadow(4px 4px 0 #ffffff);
      }

      .rare-symbol-card {
        display: grid;
        width: 100%;
        min-height: 190px;
        place-items: center;
        gap: 8px;
        padding: 18px;
        text-align: center;
        background:
          radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.9) 0 4%, transparent 5%),
          radial-gradient(circle at 78% 34%, rgba(255, 255, 255, 0.8) 0 3%, transparent 4%),
          linear-gradient(135deg, #ffe66b 0%, #b87910 54%, #fff1a8 100%);
        border: 4px solid #111111;
        border-radius: 8px;
      }

      .rare-symbol-card span {
        padding: 4px 10px;
        color: #111111;
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 999px;
        font-size: 0.85rem;
      }

      .rare-symbol-card strong {
        font-size: clamp(1.45rem, 7vw, 2.5rem);
        line-height: 1.05;
        text-shadow: 2px 2px 0 #ffffff;
      }

      .rare-card-title {
        display: grid;
        gap: 2px;
      }

      .rare-card-title strong {
        font-size: clamp(1.5rem, 6vw, 2.3rem);
        line-height: 1;
      }

      .collection-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
      }

      .collection-box {
        display: grid;
        gap: 12px;
        padding: clamp(12px, 3vw, 18px);
        background:
          linear-gradient(135deg, rgba(255, 230, 107, 0.12), rgba(140, 210, 105, 0.12)),
          #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: inset 0 0 0 3px rgba(17, 17, 17, 0.05), 6px 7px 0 rgba(17, 17, 17, 0.12);
      }

      .badge-storage-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .badge-slot,
      .card-slot {
        display: grid;
        place-items: center;
        min-width: 0;
        background: #f5f0df;
        border: 2px dashed rgba(17, 17, 17, 0.35);
        border-radius: 8px;
      }

      .badge-slot {
        aspect-ratio: 1;
      }

      .badge-slot.is-earned {
        background: linear-gradient(135deg, #fff4a8, #ffffff 44%, #99d45d);
        border-style: solid;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.14);
      }

      .badge-slot .badge-star,
      .badge-slot .badge-level {
        transform: scale(0.86);
      }

      .card-storage-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
      }

      .card-slot {
        aspect-ratio: 106 / 148;
        overflow: hidden;
        padding: 0;
      }

      .card-slot.is-earned {
        border: 2px solid #111111;
        background: #111111;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.16);
        cursor: pointer;
      }

      .card-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card-slot.is-locked::before {
        content: "?";
        color: rgba(17, 17, 17, 0.35);
        font-size: clamp(1.2rem, 6vw, 2rem);
        font-weight: 900;
      }

      .card-preview-modal {
        width: min(92vw, 430px);
        padding: 10px;
        background: #111111;
      }

      .card-preview-modal img {
        width: 100%;
        max-height: min(78vh, 720px);
        object-fit: contain;
        display: block;
        border-radius: 8px;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .menu-grid .primary-button,
      .menu-grid .ghost-button {
        min-height: 58px;
        justify-content: center;
      }

      .mission-panel {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
        gap: 14px;
        align-items: stretch;
        min-width: 0;
      }

      .mission-command {
        position: relative;
        display: grid;
        gap: 12px;
        overflow: hidden;
        padding: clamp(16px, 4vw, 24px);
        color: #ffffff;
        background:
          radial-gradient(circle at 88% 12%, rgba(156, 255, 26, 0.42), transparent 22%),
          linear-gradient(135deg, #111111 0%, #1c2a18 54%, #0e5b4f 100%);
        border: 4px solid #111111;
        border-radius: 8px;
        box-shadow: 8px 9px 0 rgba(17, 17, 17, 0.24);
      }

      .mission-command::after {
        position: absolute;
        right: -42px;
        bottom: -58px;
        width: 170px;
        height: 170px;
        content: "";
        background:
          linear-gradient(#9cff1a 0 0) center / 100% 14px no-repeat,
          linear-gradient(90deg, #9cff1a 0 0) center / 14px 100% no-repeat;
        opacity: 0.2;
        transform: rotate(22deg);
      }

      .mission-command small {
        width: fit-content;
        padding: 5px 9px;
        color: #111111;
        background: var(--sun);
        border: 2px solid #ffffff;
        border-radius: 8px;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .mission-command h2 {
        max-width: 11ch;
        font-size: clamp(2rem, 7vw, 3.4rem);
        line-height: 0.95;
      }

      .mission-command p {
        max-width: 26rem;
        color: #eaffd8;
        font-size: 1rem;
        line-height: 1.55;
      }

      .mission-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .mission-stat-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .mission-stat {
        display: grid;
        gap: 3px;
        min-height: 94px;
        padding: 12px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.16);
      }

      .mission-stat strong {
        font-size: clamp(1.8rem, 7vw, 2.7rem);
        line-height: 1;
      }

      .mission-stat span {
        color: var(--soft-ink);
        font-size: 0.82rem;
        line-height: 1.25;
      }

      .bugs-grid .bug-card {
        border-width: 3px;
        box-shadow: 7px 8px 0 rgba(17, 17, 17, 0.16);
      }

      .bug-card .bug-name {
        color: #111111;
        font-size: clamp(1.15rem, 4.5vw, 1.45rem);
        text-shadow: 1px 1px 0 var(--sun);
      }

      .create-grid .screen {
        counter-reset: createStep;
      }

      .create-grid .screen > .section-band {
        position: relative;
        padding-top: clamp(38px, 7vw, 50px);
      }

      .create-grid .screen > .section-band::before {
        position: absolute;
        top: 10px;
        left: 10px;
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        counter-increment: createStep;
        content: counter(createStep);
        color: #111111;
        background: var(--sun);
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 900;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.18);
      }

      .cover-page {
        padding: clamp(14px, 4vw, 34px);
        background:
          radial-gradient(circle at 50% 34%, rgba(255, 212, 0, 0.26), transparent 25%),
          linear-gradient(135deg, #ffffff 0%, #f5ffe4 60%, #dcf5ff 100%);
        border: 4px solid #111111;
        border-radius: 10px;
        box-shadow: 12px 14px 0 rgba(17, 17, 17, 0.18);
      }

      .cover-button {
        min-width: 150px;
        text-transform: none;
      }

      .cover-button::before {
        position: absolute;
        inset: 6px;
        content: "";
        border: 2px solid rgba(255, 255, 255, 0.65);
        border-radius: 4px;
        pointer-events: none;
      }

      .collection-badge {
        display: grid;
        gap: 8px;
        place-items: center;
        min-height: 150px;
        padding: 12px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        text-align: center;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.12);
      }

      .collection-badge.is-locked {
        opacity: 0.38;
        filter: grayscale(1);
      }

      .bug-card {
        display: grid;
        overflow: hidden;
        color: inherit;
        background: var(--paper);
        border: 2px solid var(--ink);
        border-radius: 8px;
        box-shadow: 5px 6px 0 rgba(23, 48, 35, 0.12);
      }

      .bug-card .photo-frame {
        min-height: 150px;
        border: 0;
        border-bottom: 2px solid #aecbbb;
        border-radius: 0;
      }

      .bug-card .photo-frame svg {
        width: min(82%, 210px);
      }

      .bug-body {
        display: grid;
        gap: 8px;
        padding: 12px;
      }

      .bug-name {
        font-size: 1.25rem;
        font-weight: 900;
        line-height: 1.2;
      }

      .bug-facts {
        display: grid;
        gap: 4px;
        color: var(--soft-ink);
        font-size: 0.92rem;
        font-weight: 800;
      }

      .badge-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 10px;
        background: #fffdf0;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.12);
      }

      .badge-star {
        position: relative;
        display: grid;
        width: 50px;
        height: 50px;
        place-items: center;
        color: #111111;
        background: var(--sun);
        border: 3px solid #111111;
        border-radius: 50%;
        box-shadow: 3px 4px 0 rgba(17, 17, 17, 0.18);
      }

      .badge-star .mini-icon {
        width: 28px;
        height: 28px;
        color: currentColor;
      }

      .badge-count-bubble {
        position: absolute;
        right: -7px;
        bottom: -7px;
        display: grid;
        min-width: 24px;
        height: 24px;
        place-items: center;
        padding: 0 5px;
        color: #ffffff;
        background: #111111;
        border: 2px solid #ffffff;
        border-radius: 999px;
        font-size: 0.78rem;
        line-height: 1;
      }

      .badge-level {
        display: inline-grid;
        min-width: 46px;
        min-height: 46px;
        place-items: center;
        padding: 4px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 50%;
        font-size: 0.8rem;
        font-weight: 900;
        line-height: 1;
        opacity: 0.36;
      }

      .badge-level.is-earned {
        background: var(--leaf);
        opacity: 1;
        box-shadow: inset 0 -3px 0 var(--sun);
      }

      .badge-modal-star {
        display: grid;
        width: 110px;
        height: 110px;
        place-items: center;
        margin: 0 auto 12px;
        color: #111111;
        background: radial-gradient(circle at 30% 25%, #ffffff 0 12%, var(--sun) 13% 100%);
        border: 5px solid #111111;
        border-radius: 50%;
        box-shadow: 8px 9px 0 rgba(17, 17, 17, 0.2);
      }

      .badge-modal-star .mini-icon {
        width: 66px;
        height: 66px;
        color: currentColor;
      }

      .bug-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 4px;
      }

      .small-button {
        display: inline-grid;
        grid-template-columns: 24px auto;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 46px;
        padding: 8px 10px;
        color: var(--leaf-dark);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: 0.94rem;
        font-weight: 900;
        line-height: 1.15;
        text-align: center;
        cursor: pointer;
      }

      .small-button.is-warm {
        color: var(--ink);
        background: var(--sun-soft);
        border-color: #111111;
      }

      .small-button .mini-icon {
        width: 24px;
        height: 24px;
      }

      .detail-grid,
      .care-grid {
        display: grid;
        grid-template-columns: minmax(270px, 0.72fr) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .detail-card {
        display: grid;
        gap: 14px;
        padding: clamp(16px, 3vw, 24px);
        background: var(--paper);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 8px 8px 0 rgba(17, 17, 17, 0.14);
      }

      .detail-card .photo-frame {
        min-height: 230px;
      }

      .detail-title {
        display: grid;
        gap: 6px;
      }

      .detail-title h2 {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        line-height: 1.1;
      }

      .detail-title p {
        color: var(--soft-ink);
        font-weight: 900;
      }

      .entry-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .entry-field {
        display: grid;
        gap: 6px;
        padding: 12px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
      }

      .entry-field.is-wide {
        grid-column: 1 / -1;
      }

      .entry-field label {
        color: var(--leaf-dark);
        font-size: 0.92rem;
        font-weight: 900;
      }

      .entry-field input,
      .entry-field textarea {
        width: 100%;
        min-height: 52px;
        padding: 10px 12px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font: inherit;
        font-weight: 900;
      }

      .entry-field textarea {
        min-height: 110px;
        resize: vertical;
        line-height: 1.45;
      }

      .care-tips {
        display: grid;
        gap: 10px;
      }

      .care-tip {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 10px;
        align-items: start;
        padding: 12px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        line-height: 1.5;
      }

      .care-records {
        display: grid;
        gap: 10px;
      }

      .care-record {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        padding: 12px;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
      }

      .care-record time {
        color: var(--leaf-dark);
        white-space: nowrap;
      }

      .empty-state {
        display: grid;
        gap: 14px;
        place-items: center;
        min-height: 260px;
        padding: 24px;
        color: var(--soft-ink);
        background: #ffffff;
        border: 2px dashed var(--line);
        border-radius: 8px;
        text-align: center;
        font-size: 1.3rem;
        font-weight: 900;
      }

      .map-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.42fr);
        gap: 16px;
        align-items: start;
      }

      .map-panel {
        position: relative;
        display: grid;
        place-items: center;
        min-height: clamp(330px, 52vh, 560px);
        padding: 18px;
        overflow: hidden;
        background: linear-gradient(180deg, #f2fff1, #ffffff 58%, #fffdf7);
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 10px 10px 0 rgba(17, 17, 17, 0.14);
      }

      .map-panel::before {
        display: none;
      }

      .map-panel::after {
        display: none;
      }

      .japan-map {
        position: relative;
        width: min(100%, 560px);
        height: auto;
        max-height: 70vh;
      }

      .region-shape {
        fill: #dff1d8;
        stroke: #ffffff;
        stroke-width: 4;
        stroke-linejoin: round;
        cursor: pointer;
        filter: drop-shadow(3px 4px 0 rgba(17, 17, 17, 0.12));
        transition: fill 0.18s ease, transform 0.18s ease;
      }

      .region-shape.has-bugs {
        fill: #fff4a8;
      }

      .region-shape.is-active {
        fill: #9bd56f;
      }

      .region-tile:hover .region-shape,
      .region-tile:focus-visible .region-shape {
        fill: #a9d08e;
      }

      .region-label {
        display: block;
        fill: #385723;
        font-size: 13px;
        font-weight: 900;
        paint-order: stroke;
        stroke: #ffffff;
        stroke-width: 4px;
        pointer-events: none;
      }

      .region-dot {
        fill: var(--coral);
        stroke: #111111;
        stroke-width: 3;
      }

      .region-count {
        fill: #ffffff;
        font-size: 12px;
        font-weight: 900;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }

      .pin-button {
        position: absolute;
        z-index: 2;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        padding: 0;
        color: var(--ink);
        background: var(--sun);
        border: 3px solid var(--ink);
        border-radius: 50%;
        box-shadow: 5px 6px 0 rgba(17, 17, 17, 0.15);
        font-weight: 900;
        transform: translate(-50%, -50%);
      }

      .pin-button.is-active {
        background: var(--sky);
      }

      .pin-count {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        color: #ffffff;
        background: var(--coral);
        border: 2px solid var(--ink);
        border-radius: 50%;
      }

      .map-side {
        display: grid;
        gap: 10px;
      }

      .map-location-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
        gap: 8px;
      }

      .map-location-card {
        display: grid;
        gap: 4px;
        min-height: 82px;
        padding: 9px;
        color: var(--ink);
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 8px;
        box-shadow: 4px 5px 0 rgba(17, 17, 17, 0.12);
        text-align: left;
        font-weight: 900;
      }

      .map-location-card.is-active {
        background: var(--sun);
        border-color: var(--leaf-dark);
      }

      .map-location-card small {
        color: var(--soft-ink);
        font-size: 0.74rem;
        line-height: 1.35;
      }

      .region-legend-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px;
      }

      .region-legend-card {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        align-items: center;
        min-height: 46px;
        padding: 8px 9px;
        color: var(--ink);
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        text-align: left;
      }

      .region-legend-card.is-active {
        background: var(--sky);
      }

      .region-legend-card .region-badge {
        display: grid;
        min-width: 28px;
        height: 28px;
        place-items: center;
        color: #ffffff;
        background: var(--coral);
        border: 2px solid #111111;
        border-radius: 50%;
        font-size: 0.8rem;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(10, 24, 16, 0.42);
      }

      .adult-panel {
        display: grid;
        gap: 16px;
        width: min(520px, 100%);
        padding: clamp(18px, 5vw, 28px);
        background: #fffdf6;
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 12px 12px 0 rgba(23, 48, 35, 0.24);
      }

      .adult-panel h2 {
        font-size: clamp(1.8rem, 6vw, 2.7rem);
        letter-spacing: 0;
      }

      .adult-panel p {
        color: var(--soft-ink);
        font-size: 1.15rem;
        font-weight: 800;
        line-height: 1.6;
      }

      .gate-row {
        display: grid;
        grid-template-columns: 1fr 150px;
        gap: 10px;
        align-items: center;
      }

      .gate-question {
        color: var(--ink);
        font-size: 2rem;
        font-weight: 900;
      }

      .gate-input {
        width: 100%;
        min-height: 64px;
        padding: 8px 12px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid var(--ink);
        border-radius: 8px;
        font-size: 2rem;
        font-weight: 900;
        text-align: center;
      }

      .error-text {
        min-height: 1.4em;
        color: #a33a2a;
        font-weight: 900;
      }

      .preview-header {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px;
        align-items: center;
      }

      .preview-header h2 {
        font-size: clamp(1.7rem, 5vw, 2.6rem);
      }

      .sheet-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 150px;
        gap: 16px;
        align-items: start;
      }

      .paper-wrap {
        overflow: auto;
        padding: clamp(10px, 2vw, 18px);
        background: #dfe9e3;
        border: 2px solid #c7d7cc;
        border-radius: 8px;
      }

      .sheet {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 16px;
        width: min(100%, 760px);
        aspect-ratio: 210 / 297;
        min-height: 0;
        margin: 0 auto;
        padding: clamp(18px, 4vw, 34px);
        background: #fffef9;
        border: 2px solid #173023;
        border-radius: 4px;
        box-shadow: 0 18px 30px rgba(23, 48, 35, 0.18);
      }

      .sheet-top {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        border-bottom: 4px solid var(--leaf);
        padding-bottom: 10px;
      }

      .sheet-title {
        font-size: clamp(1.7rem, 4.6vw, 3rem);
        font-weight: 900;
        line-height: 1.1;
      }

      .sheet-date {
        color: var(--soft-ink);
        font-weight: 900;
        white-space: nowrap;
      }

      .sheet-photo {
        display: grid;
        min-height: 0;
        place-items: center;
        background:
          linear-gradient(90deg, rgba(47, 122, 79, 0.08) 1px, transparent 1px),
          linear-gradient(0deg, rgba(47, 122, 79, 0.08) 1px, transparent 1px),
          #fbfff8;
        background-size: 22px 22px;
        border: 2px solid #9dbfae;
        border-radius: 4px;
      }

      .sheet-photo svg {
        width: min(78%, 480px);
        height: auto;
      }

      .sheet-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .sheet-info {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .sheet-field {
        display: grid;
        gap: 6px;
        padding: 12px;
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 4px;
      }

      .sheet-field.memo {
        grid-column: 1 / -1;
      }

      .sheet-label {
        color: var(--leaf-dark);
        font-size: 0.85rem;
        font-weight: 900;
      }

      .sheet-value {
        min-height: 1.5em;
        font-size: clamp(1rem, 2.6vw, 1.35rem);
        font-weight: 900;
        line-height: 1.45;
      }

      .thumb-list {
        display: grid;
        gap: 10px;
      }

      .thumb-button {
        display: grid;
        gap: 6px;
        padding: 8px;
        color: var(--ink);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-weight: 900;
        text-align: left;
      }

      .thumb-button.is-active {
        border-color: var(--leaf-dark);
        box-shadow: inset 0 0 0 2px var(--leaf);
      }

      .thumb-button svg {
        width: 100%;
        height: 74px;
      }

      .book-options {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .book-studio {
        display: grid;
        grid-template-columns: minmax(280px, 0.9fr) minmax(300px, 1.1fr);
        gap: 16px;
        align-items: start;
      }

      .book-control-panel,
      .book-live-panel {
        display: grid;
        gap: 14px;
        padding: clamp(14px, 2.5vw, 20px);
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        box-shadow: 6px 7px 0 rgba(17, 17, 17, 0.13);
      }

      .book-choice-grid {
        display: grid;
        gap: 10px;
      }

      .book-choice {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 10px;
        min-height: 70px;
        padding: 10px;
        color: #111111;
        background: #fffdf8;
        border: 3px solid #111111;
        border-radius: 8px;
        text-align: left;
        cursor: pointer;
      }

      .book-choice.is-active {
        background: var(--sun);
        box-shadow: inset 0 -5px 0 var(--leaf);
      }

      .book-choice .mini-icon {
        width: 34px;
        height: 34px;
      }

      .book-choice strong {
        display: block;
        font-size: 1.04rem;
        line-height: 1.15;
      }

      .book-choice small,
      .book-count-pill {
        color: var(--soft-ink);
        font-size: 0.78rem;
        font-weight: 900;
        line-height: 1.25;
      }

      .book-count-pill {
        display: grid;
        min-width: 46px;
        min-height: 34px;
        place-items: center;
        padding: 4px 8px;
        color: #111111;
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 999px;
      }

      .book-refiners {
        display: grid;
        gap: 10px;
      }

      .book-refiner-row {
        display: grid;
        gap: 8px;
      }

      .book-refiner-row > span {
        color: var(--soft-ink);
        font-size: 0.84rem;
        font-weight: 900;
      }

      .book-type-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
        gap: 8px;
      }

      .book-type-button {
        display: grid;
        min-width: 0;
        min-height: 48px;
        place-items: center;
        padding: 7px 6px;
        color: #111111;
        background: #ffffff;
        border: 3px solid #111111;
        border-radius: 8px;
        font-size: clamp(0.78rem, 2.7vw, 0.94rem);
        font-weight: 900;
        line-height: 1.12;
        text-align: center;
        word-break: keep-all;
        overflow-wrap: anywhere;
        cursor: pointer;
      }

      .book-type-button.is-active {
        background: var(--sun);
        box-shadow: inset 0 -4px 0 var(--leaf);
      }

      .book-summary-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .book-stat {
        display: grid;
        gap: 4px;
        min-height: 70px;
        align-content: center;
        padding: 10px;
        background: #f4fff2;
        border: 2px solid #111111;
        border-radius: 8px;
        text-align: center;
      }

      .book-stat strong {
        font-size: 1.45rem;
        line-height: 1;
        overflow-wrap: anywhere;
      }

      .book-stat span {
        color: var(--soft-ink);
        font-size: 0.78rem;
        line-height: 1.2;
      }

      .book-mini-shelf {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
        gap: 8px;
      }

      .book-mini-page {
        display: grid;
        gap: 5px;
        padding: 6px;
        background: #fffef7;
        border: 2px solid #111111;
        border-radius: 8px;
        font-size: 0.75rem;
        line-height: 1.2;
      }

      .book-mini-page .photo-frame {
        min-height: 64px;
        border-width: 1px;
      }

      .book-mini-page .photo-frame::before {
        inset: 7px;
      }

      .book-mini-more {
        display: grid;
        min-height: 88px;
        place-items: center;
        padding: 8px;
        color: #111111;
        background: var(--sun-soft);
        border: 2px dashed #111111;
        border-radius: 8px;
        font-size: 0.86rem;
        text-align: center;
      }

      .book-empty-note {
        padding: 12px;
        color: var(--soft-ink);
        background: #fff7e7;
        border: 2px solid #111111;
        border-radius: 8px;
        line-height: 1.45;
      }

      .book-preview {
        display: grid;
        grid-template-columns: minmax(280px, 0.55fr) minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .book-preview.is-polished {
        grid-template-columns: minmax(320px, 0.85fr) minmax(0, 1.15fr);
      }

      .book-cover,
      .book-back,
      .book-spine,
      .book-page {
        display: grid;
        gap: 14px;
        min-height: 440px;
        padding: clamp(18px, 3vw, 28px);
        background: #fffdf6;
        border: 3px solid var(--ink);
        border-radius: 8px;
        box-shadow: 8px 8px 0 rgba(23, 48, 35, 0.16);
      }

      .book-cover-spread.is-premium {
        min-height: 520px;
        background: #111111;
        border-width: 4px;
      }

      .book-cover {
        align-content: space-between;
        background:
          linear-gradient(180deg, rgba(245, 200, 95, 0.34), transparent 52%),
          #e5f6ed;
      }

      .book-cover-spread {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 74px minmax(0, 1fr);
        min-height: 440px;
        border: 3px solid var(--ink);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 8px 8px 0 rgba(23, 48, 35, 0.16);
      }

          ["hymenoptera", ["はち", "あり", "すずめばち", "みつばち", "あしながばち"]],
          ["orthoptera", ["ばった", "こおろぎ", "きりぎりす", "すずむし", "いなご"]],
          ["hemiptera", ["かめむし", "せみ", "あぶらむし", "あめんぼ", "たがめ"]],
        ];
        return rules.find(([, words]) => words.some((word) => text.includes(word)))?.[0] || (taxonCategories[selectedCategory] ? selectedCategory : "unknown");

      function bookYears() {
        const years = Array.from(new Set(state.bugs.map((bug) => String(bug.dateValue || "").slice(0, 4)).filter(Boolean)));
        return years.length ? years.sort((a, b) => b.localeCompare(a)) : [state.bookYear || String(new Date().getFullYear())];
      }

      function bookCountFor(mode, value = "") {
        if (mode === "year") return state.bugs.filter((bug) => bug.dateValue.startsWith(`${value}-`)).length;
        if (mode === "type") return state.bugs.filter((bug) => bug.type === value).length;
        return state.bugs.length;
      }

      function bookModeLabel() {
        if (state.bookMode === "year") return `${state.bookYear}ねん`;
        if (state.bookMode === "type") return bugTypes[state.bookType] || "しゅるい";
        return "ぜんぶ";
      }

        const bugs = selectedBookBugs();
        const years = bookYears();
        const previewBugs = bugs.slice(0, 5);
        return `
          <div class="book-studio">
            <div class="book-control-panel">
              <div class="book-choice-grid" aria-label="せいほんの えらびかた">
                ${[
                  ["all", "ぜんぶで つくる", "今までの きろくを ぜんぶ 入れる", "book", bookCountFor("all")],
                  ["year", "1ねんで つくる", "年ごとに まとまった 本にする", "calendar", bookCountFor("year", state.bookYear)],
                  ["type", "しゅるいで つくる", "同じ なかまだけで 本にする", "tree", bookCountFor("type", state.bookType)],
                ]
                  .map(
                    ([mode, title, note, iconName, count]) => `
                      <button class="book-choice ${state.bookMode === mode ? "is-active" : ""}" type="button" onclick="setBookMode('${mode}')">
                        <span class="mini-icon" aria-hidden="true">${icon(iconName)}</span>
                        <span><strong>${title}</strong><small>${note}</small></span>
                        <span class="book-count-pill">${count}こ</span>

                <div class="book-refiner-row">
                  <span>しゅるいをえらぶ</span>

        const location = locations[key];
        if (!location) return "kanto";
        const guessed = guessRegion(locationSearchText(location));
        location.region = guessed || "kanto";
        const region = japanRegions[location.region] || japanRegions.kanto;
        location.x = region.x;
        location.y = region.y;
        saveLocations();
        return location.region;
      }

        const special = {
          25: { title: "むしはかせ ばっじ", note: "25ひき とうたつ。すごい ずかんに なってきたよ。" },
          50: { title: "むしけんきゅうか ばっじ", note: "50ひき とうたつ。もう ほんものの けんきゅうかみたい。" },
          75: { title: "むしずかん おう ばっじ", note: "75ひき とうたつ。めずらしい きろくも ふえてきたね。" },
          100: { title: "ムシポケ ますたー ばっじ", note: "100ひき とうたつ。きみは ムシポケ ますたー。" },
        };
        if (special[count]) return { count, special: true, ...special[count] };
        if (count > 0 && count % 5 === 0) {
          return { count, special: false, title: "むしますたー ほしばっじ", note: `${count}ひき とうろく。ほしばっじを げっと。` };
        }
        return null;

        return { count, starCount, nextStar: count >= 100 ? 0 : nextStar || 5, nextSpecial };

      function filteredBugs() {
        const filtered = state.filter === "all" ? state.bugs : state.bugs.filter((bug) => bug.place === state.filter);

          if (state.sort === "date") return b.dateValue.localeCompare(a.dateValue);
          if (state.sort === "place") {
            const placeDiff = getPlaceLabel(a).localeCompare(getPlaceLabel(b), "ja");
            if (placeDiff !== 0) return placeDiff;
          }
          if (state.sort === "type") {
            const categoryOrder = Object.keys(taxonCategories);
            const aIndex = categoryOrder.includes(a.category) ? categoryOrder.indexOf(a.category) : categoryOrder.length;
            const bIndex = categoryOrder.includes(b.category) ? categoryOrder.indexOf(b.category) : categoryOrder.length;
            const categoryDiff = aIndex - bIndex;
            if (categoryDiff !== 0) return categoryDiff;
            const familyDiff = String(a.familyLabel || "").localeCompare(String(b.familyLabel || ""), "ja");
            if (familyDiff !== 0) return familyDiff;
            const labelDiff = getCategoryLabel(a).localeCompare(getCategoryLabel(b), "ja");
            if (labelDiff !== 0) return labelDiff;
          }
          return String(a.name || "").localeCompare(String(b.name || ""), "ja");
        });
      }

      function seasonInfo(dateValue) {
        const month = Number(String(dateValue || "").split("-")[1]);
        if ([3, 4, 5].includes(month)) return { key: "spring", label: "はる" };
        if ([6, 7, 8].includes(month)) return { key: "summer", label: "なつ" };
        if ([9, 10, 11].includes(month)) return { key: "autumn", label: "あき" };
        return { key: "winter", label: "ふゆ" };
      }

      function nameGroupInfo(name) {
        const first = String(name || "").trim()[0] || "";
        const groups = [
          ["あ", /^[ぁ-お]/],
          ["か", /^[か-ご]/],
          ["さ", /^[さ-ぞ]/],
          ["た", /^[た-ど]/],
          ["な", /^[な-の]/],
          ["は", /^[は-ぽ]/],
          ["ま", /^[ま-も]/],
          ["や", /^[や-よ]/],
          ["ら", /^[ら-ろ]/],
          ["わ", /^[わ-ん]/],
        ];
        const found = groups.find(([, pattern]) => pattern.test(first));
        return { key: found?.[0] || "ほか", label: found ? `${found[0]}ぎょう` : "ほか" };
      }

      function zukanGroupEntries() {
        const countFor = (match) => state.bugs.filter(match).length;
        if (state.zukanView === "season") {
          return [
            ["all", "ぜんぶ", state.bugs.length],
            ["spring", "はる", countFor((bug) => seasonInfo(bug.dateValue).key === "spring")],
            ["summer", "なつ", countFor((bug) => seasonInfo(bug.dateValue).key === "summer")],
            ["autumn", "あき", countFor((bug) => seasonInfo(bug.dateValue).key === "autumn")],
            ["winter", "ふゆ", countFor((bug) => seasonInfo(bug.dateValue).key === "winter")],
          ];
        }
        if (state.zukanView === "place") {
          const entries = Object.entries(locations).map(([key, place]) => [key, place.label, countFor((bug) => bug.place === key)]);
          return [["all", "ぜんぶ", state.bugs.length], ...entries];
        }
        if (state.zukanView === "name") {
          const labels = ["あ", "か", "さ", "た", "な", "は", "ま", "や", "ら", "わ", "ほか"];
          return [
            ["all", "ぜんぶ", state.bugs.length],
            ...labels.map((key) => [key, key === "ほか" ? "ほか" : `${key}ぎょう`, countFor((bug) => nameGroupInfo(bug.name).key === key)]),
          ];
        }
        const categoryEntries = Object.entries(taxonCategories).map(([key, category]) => [
          key,
          category.subLabel ? `${category.label}（${category.subLabel}）` : category.label,
          countFor((bug) => normalizeBugTaxon(bug).category === key),
        ]);
        const uncategorized = countFor((bug) => !taxonCategories[normalizeBugTaxon(bug).category]);
        return [["all", "ぜんぶ", state.bugs.length], ...categoryEntries, ["uncategorized", "みぶんるい", uncategorized]];
      }

      function zukanBugs() {
        let bugs = [...state.bugs];
        if (state.zukanGroup !== "all") {
          if (state.zukanView === "season") bugs = bugs.filter((bug) => seasonInfo(bug.dateValue).key === state.zukanGroup);
          if (state.zukanView === "place") bugs = bugs.filter((bug) => bug.place === state.zukanGroup);
          if (state.zukanView === "name") bugs = bugs.filter((bug) => nameGroupInfo(bug.name).key === state.zukanGroup);
          if (state.zukanView === "type") {
            bugs =
              state.zukanGroup === "uncategorized"
                ? bugs.filter((bug) => !taxonCategories[normalizeBugTaxon(bug).category])
                : bugs.filter((bug) => normalizeBugTaxon(bug).category === state.zukanGroup);
          }
        }
        return bugs.sort((a, b) => {
          if (state.zukanView === "season") return b.dateValue.localeCompare(a.dateValue);
          if (state.zukanView === "place") return getPlaceLabel(a).localeCompare(getPlaceLabel(b), "ja") || String(a.name || "").localeCompare(String(b.name || ""), "ja");
          if (state.zukanView === "type") {
            return (
              getCategoryLabel(a).localeCompare(getCategoryLabel(b), "ja") ||
              String(a.familyLabel || "").localeCompare(String(b.familyLabel || ""), "ja") ||
              String(a.name || "").localeCompare(String(b.name || ""), "ja")
            );
          }
          return String(a.name || "").localeCompare(String(b.name || ""), "ja");
        });
      }

      function startSpeechInput(options) {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!Recognition) {
          options.onUnsupported?.();
          showToast("このブラウザは まいくが にがてだよ");
          render();
          return;
        }

        if (state[options.flag]) return;
        let gotResult = false;
        const recognition = new Recognition();
        recognition.lang = "ja-JP";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        recognition.continuous = false;
        options.assign?.(recognition);

        recognition.onresult = (event) => {
          gotResult = true;
          state[options.flag] = false;
          const rawText = event.results?.[0]?.[0]?.transcript || "";
          options.onText(rawText);
          render();
        };

        recognition.onerror = (event) => {
          state[options.flag] = false;
          if (options.onError) {
            options.onError(event);
          } else {
            showSpeechError(event);
          }
          render();
        };

        recognition.onend = () => {
          if (gotResult) return;
          if (!state[options.flag]) return;
          state[options.flag] = false;
          options.onEmpty?.();
          render();
        };

        try {
          state[options.flag] = true;
          options.onStart?.();
          recognition.start();
          render();
        } catch (error) {
          state[options.flag] = false;
          if (options.onError) {
            options.onError(error);
          } else {
            showSpeechError(error);
          }
          render();
        }
      }

      function showSpeechError(error) {
        const reason = error?.error || error?.name || "";
        if (reason === "not-allowed" || reason === "service-not-allowed" || reason === "NotAllowedError") {
          showToast("まいくを きょかしてね");
          return;
        }
        if (reason === "network") {
          showToast("もういちど まいくを おしてね");
          return;
        }
        if (!window.isSecureContext && !["localhost", "127.0.0.1"].includes(window.location.hostname)) {
          showToast("HTTPSで ひらくと まいくが つかえるよ");
          return;
        }
        showToast("もういちど まいくを おしてね");
      }

      function compressPhotoData(file, done) {
        const reader = new FileReader();
        reader.onload = () => {
          const source = String(reader.result || "");
          const image = new Image();
          image.onload = () => {
            const maxSide = 1200;
            const scale = Math.min(1, maxSide / Math.max(image.width, image.height));
            const width = Math.max(1, Math.round(image.width * scale));
            const height = Math.max(1, Math.round(image.height * scale));
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext("2d");
            context.drawImage(image, 0, 0, width, height);
            done(canvas.toDataURL("image/jpeg", 0.82));
          };
          image.onerror = () => done(source);
          image.src = source;
        };
        reader.onerror = () => done("");
        reader.readAsDataURL(file);
      }

      function handlePhotoFile(kind, input) {

        if (!file) return;

            state.createDateMode = kind === "album" ? "photo" : "today";

          input.value = "";
          render();

      function cleanLocationText(text, maxLength, dropUnknownKanji = false) {
        let hiraganaText = placeTextToHiragana(kanaToHiragana(String(text || "")));
        if (dropUnknownKanji && hasKanji(hiraganaText)) {
          hiraganaText = hiraganaText.replace(/[\u3400-\u9fff]+/g, " ");
        }
        if (hasKanji(hiraganaText)) return "";
        return hiraganaText
          .replace(/[。．、,，!！?？]/g, " ")
          .replace(/[^ぁ-ゖー\s]/g, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, maxLength);
      }

        return /[\u3400-\u9fff]/.test(text);
      }

        const raw = String(rawText || "").trim();
        if (!raw) return false;
        if (!hasKanji(raw)) return Boolean(cleanText);
        return Boolean(cleanText) && cleanText.length >= 3;
