      function parseDateText(text) {
        const today = todayValue();
        const currentYear = Number(today.slice(0, 4));
        const currentMonth = Number(today.slice(5, 7));
        const currentDay = Number(today.slice(8, 10));
        const normalized = spokenNumberToDigit(
          kanaToHiragana(String(text || ""))
            .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xfee0))
            .replace(/\s+/g, "")
        );
        if (!normalized) return "";
        if (normalized.includes("きょう")) return today;
        if (normalized.includes("きのう")) {
          const date = new Date(today);
          date.setDate(date.getDate() - 1);
          return date.toISOString().slice(0, 10);
        }
        const slashMatch = normalized.match(/(\d{1,2})[\/.-](\d{1,2})/);
        const jpMatch = normalized.match(/(?:(\d{4})ねん)?(\d{1,2})がつ(\d{1,2})にち/);
        const month = Number(jpMatch?.[2] || slashMatch?.[1] || currentMonth);
        const day = Number(jpMatch?.[3] || slashMatch?.[2] || currentDay);
        const year = Number(jpMatch?.[1] || currentYear);
        const date = new Date(year, month - 1, day);
        if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return "";
        return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      }

        const number = Number(value);
        if (!Number.isFinite(number)) return min;
        return Math.min(max, Math.max(min, Math.round(number)));

      function formatSize(cm = state.createSizeCm, mm = state.createSizeMm) {
        const safeCm = clampNumber(cm, 0, 30);
        const safeMm = clampNumber(mm, 0, 9);
        if (safeCm === 0 && safeMm === 0) return "0みり";
        if (safeCm === 0) return `${safeMm}みり`;
        if (safeMm === 0) return `${safeCm}せんち`;
        return `${safeCm}せんち${safeMm}みり`;
      }

      function spokenNumberToDigit(text) {
        const digitWords = {
          きゅう: 9,
          く: 9,
          はち: 8,
          なな: 7,
          しち: 7,
          ろく: 6,
          ご: 5,
          よん: 4,
          し: 4,
          さん: 3,
          に: 2,
          いち: 1,
          ぜろ: 0,
          れい: 0,
        };
        let normalized = text.replace(/じゅう(きゅう|く|はち|なな|しち|ろく|ご|よん|し|さん|に|いち)?/g, (_, tail) => String(10 + (digitWords[tail] || 0)));
        const words = [
          ["きゅう", "9"],
          ["はち", "8"],
          ["なな", "7"],
          ["しち", "7"],
          ["ろく", "6"],
          ["く", "9"],
          ["ご", "5"],
          ["よん", "4"],
          ["し", "4"],
          ["さん", "3"],
          ["に", "2"],
          ["いち", "1"],
          ["ぜろ", "0"],
          ["れい", "0"],
        ];
        return words.reduce((value, [word, digit]) => value.replaceAll(word, digit), normalized);
      }

      function cleanSizeText(text) {
        return kanaToHiragana(String(text || ""))
          .replace(/[０-９]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0xfee0))
          .replace(/\s+/g, "")
          .replace(/センチメートル|せんちめーとる/g, "せんち")
          .replace(/センチ|せんち/g, "せんち")
          .replace(/ミリメートル|みりめーとる/g, "みり")
          .replace(/ミリ|みり/g, "みり");
      }

      function parseSizeText(text) {
        const cleaned = spokenNumberToDigit(cleanSizeText(text));
        const cmMatch = cleaned.match(/(\d{1,2})せんち/);
        const mmMatch = cleaned.match(/(\d)みり/);
        const onlyNumber = cleaned.match(/^(\d{1,2})$/);
        if (!cmMatch && !mmMatch && !onlyNumber) return null;
        return {
          cm: clampNumber(cmMatch ? cmMatch[1] : onlyNumber ? onlyNumber[1] : mmMatch ? 0 : state.createSizeCm, 0, 30),
          mm: clampNumber(mmMatch ? mmMatch[1] : cmMatch ? state.createSizeMm : 0, 0, 9),
        };
      }

        render();
      }

      function closeGate() {
        state.gateOpen = false;
        render();
      }

      function updateGate(value) {
        state.gateAnswer = value.replace(/[^\d]/g, "").slice(0, 2);
        renderGate();
      }

      function passGate() {
        if (state.gateAnswer === "8") {
          state.gateOpen = false;
          state.screen = state.gateTarget === "book" ? "book" : "print";
          state.gateError = "";
          render();
          return;
        }
        state.gateError = "もういちど ためしてね";
        renderGate();
      }

      function printNow() {
        window.print();
      }

      function selectSheet(index) {
        state.sheetIndex = index;
        render();
      }

      function activePrintBugs() {
        const byId = new Map(state.bugs.map((bug) => [bug.id, bug]));
        return state.printIds.map((id) => byId.get(id)).filter(Boolean);
      }

      function selectedBug() {
        return state.bugs.find((bug) => bug.id === state.selectedBugId) || state.bugs[0] || null;
      }

      function openBugDetail(id) {
        state.selectedBugId = id;
        state.screen = "detail";
        render();
      }

      function openCare(id) {
        state.selectedBugId = id;
        state.screen = "care";
        render();
      }

      function updateBugField(id, field, value) {
        const bug = state.bugs.find((item) => item.id === id);
        if (!bug) return;
        if (field === "count") bug.count = Math.max(0, Number(value || 0));
        if (field === "size") bug.size = value.slice(0, 12);
      }

      function updateCareDraft(value) {
        state.careDraft = value.slice(0, 80);
      }

      function addCareRecord(id) {
        const bug = state.bugs.find((item) => item.id === id);
        const text = state.careDraft.trim();
        if (!bug || !text) {
          showToast("しいくの めもを いれてね");
          return;
        }
        bug.careRecords = bug.careRecords || [];
        bug.careRecords.unshift({ dateText: formatDateText(todayValue()), text });
        saveBugs();
        state.careDraft = "";
        showToast("しいくきろくを つけたよ");
        render();
      }

        ];
        return `
          <section class="screen">
            <section class="section-band">
              <div class="section-title">
                <span class="tool-icon" aria-hidden="true">${icon("star")}</span>

              <section class="adult-panel">
                <div class="section-title">
                  <span class="tool-icon" aria-hidden="true">${icon(isCamera ? "camera" : "album")}</span>
                  <div>
                    <h2>${isCamera ? "かめらを つかう？" : "あるばむを つかう？"}</h2>
                    <p>${isCamera ? "むしの しゃしんを とるために つかうよ。" : "えらんだ しゃしんだけを つかうよ。"}</p>
                  </div>
                </div>
                <button class="primary-button sun" type="button" onclick="confirmPhotoPermission()">
                  <span class="mini-icon" aria-hidden="true">${icon("check")}</span>
                  <span>つかう</span>
                </button>
                <button class="ghost-button" type="button" onclick="closePhotoPermission()">
                  <span class="mini-icon" aria-hidden="true">${icon("back")}</span>
                  <span>やめる</span>
                </button>
              </section>
            </div>
          `;
          return;
        }
        if (state.rareCardOpen && state.earnedRareCard) {
          const card = state.earnedRareCard;
          root.innerHTML = `
            <div class="modal-backdrop" role="dialog" aria-modal="true" aria-label="レアカード">
              <section class="adult-panel">
                <article class="${rareCardShellClass(card)}">
                  <div class="rare-card-title">
                    <small>レアカード</small>
                    <strong>${escapeHtml(card.name)}</strong>
                  </div>
                  <div class="${rareCardArtClass(card)}">${rareCardArt(card)}</div>
                  <p>${escapeHtml(card.area)}</p>
                  <p>${escapeHtml(card.period)}に であいやすいよ。</p>
                </article>
                <button class="primary-button sun" type="button" onclick="closeRareCard()">
                  <span class="mini-icon" aria-hidden="true">${icon("check")}</span>
                  <span>カードを もらう</span>
                </button>
              </section>
            </div>
          `;
          return;
        }
        if (state.collectionCardOpen && state.selectedCollectionCardKey) {
          const card = outingMissions.find((mission) => mission.key === state.selectedCollectionCardKey);
          if (card) {
            root.innerHTML = `
              <div class="modal-backdrop" role="dialog" aria-modal="true" aria-label="${escapeHtml(card.name)}">
                <section class="adult-panel card-preview-modal">
                  <img src="${rareCardAsset(card)}" alt="${escapeHtml(card.name)}" />
                  <button class="primary-button sun" type="button" onclick="closeCollectionCard()">
                    <span class="mini-icon" aria-hidden="true">${icon("check")}</span>
                    <span>とじる</span>
                  </button>
                </section>
              </div>
            `;
            return;
          }
        }
        if (state.badgeOpen && state.earnedBadge) {
          const badge = state.earnedBadge;
          root.innerHTML = `
            <div class="modal-backdrop" role="dialog" aria-modal="true" aria-label="ばっじ">
              <section class="adult-panel">
                <div class="badge-modal-star" aria-hidden="true">
                  <span class="mini-icon">${icon("star")}</span>
                </div>
                <div class="section-title">
                  <span class="tool-icon" aria-hidden="true">${icon("star")}</span>
                  <div>
                    <h2>${badge.special ? "とくべつ ばっじ" : "ほしばっじ"}</h2>
                    <p>${escapeHtml(badge.title)}</p>
                  </div>
                </div>
                <p class="gate-question">${escapeHtml(badge.note)}</p>
                <button class="primary-button sun" type="button" onclick="closeBadge()">
                  <span class="mini-icon" aria-hidden="true">${icon("check")}</span>
                  <span>やった</span>
                </button>
              </section>
            </div>
          `;
          return;
        }
        if (!state.gateOpen) {
          root.innerHTML = "";
          return;
        }
        root.innerHTML = `
          <div class="modal-backdrop" role="dialog" aria-modal="true" aria-label="おとなの めにゅー">
            <section class="adult-panel">
              <div class="section-title">
                <span class="tool-icon" aria-hidden="true">${icon("lock")}</span>
                <div>
                  <h2>おとなの めにゅー</h2>
                  <p>おとなと いっしょに すすんでね。</p>
                </div>
              </div>
              <div class="gate-row">
                <div class="gate-question">3 + 5 = ?</div>
                <input class="gate-input" inputmode="numeric" pattern="[0-9]*" value="${state.gateAnswer}" oninput="updateGate(this.value)" aria-label="こたえ" autofocus />
              </div>
              <div class="error-text">${state.gateError}</div>
              <button class="primary-button" type="button" onclick="passGate()">
                <span class="mini-icon" aria-hidden="true">${icon("check")}</span>
                <span>すすむ</span>
              </button>
              <button class="ghost-button" type="button" onclick="closeGate()">
                <span class="mini-icon" aria-hidden="true">${icon("back")}</span>
                <span>もどる</span>
              </button>
            </section>
          </div>
        `;
        const input = root.querySelector(".gate-input");
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      }

      function renderToast() {
        document.getElementById("toastRoot").innerHTML = state.toast ? `<div class="toast">${state.toast}</div>` : "";
      }

      function renderPrintableSheets() {
        const root = document.getElementById("printableSheets");
        const bugs = activePrintBugs();
        if (state.screen === "book") {
          root.innerHTML = `${renderBookCoverSpread(bugs)}${bugs.map((bug, index) => renderBookPage(bug, index)).join("")}`;
          return;
        }
        root.innerHTML = bugs.map(renderSheet).join("");
      }

      function renderNav() {
        const labels = [
          ["home", "home", "ひょうし"],
          ["list", "book", "ずかん"],
          ["map", "map", "ちず"],
          ["collection", "star", "カード"],
          ["create", "plus", "ついか"],
        ];
        document.querySelectorAll(".nav-button").forEach((button) => {
          const screen = button.dataset.screen;
          const item = labels.find(([key]) => key === screen);
          const active =
            state.screen === screen ||
            (["print", "book", "bookStudio", "detail", "care"].includes(state.screen) && screen === "list");
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-label", item[2]);
          button.innerHTML = `<span class="mini-icon" aria-hidden="true">${icon(item[1])}</span>`;
        });
        document.querySelector(".topbar .icon-button:first-child .mini-icon").innerHTML = icon("menu");
        document.querySelector(".topbar .icon-button:last-child .mini-icon").innerHTML = icon("print");
      }

      function render() {
        document.body.classList.toggle("is-cover", state.screen === "home");
        const app = document.getElementById("app");
        if (state.screen === "home") app.innerHTML = renderHome();
        if (state.screen === "create") app.innerHTML = renderCreate();
        if (state.screen === "list") app.innerHTML = renderList();
        if (state.screen === "map") app.innerHTML = renderMap();
        if (state.screen === "collection") app.innerHTML = renderCollection();
        if (state.screen === "detail") app.innerHTML = renderDetail();
        if (state.screen === "care") app.innerHTML = renderCare();
        if (state.screen === "print") app.innerHTML = renderPrint();
        if (state.screen === "bookStudio") app.innerHTML = renderBookStudioPage();
        if (state.screen === "book") app.innerHTML = renderBook();
        renderNav();
        renderGate();
        renderToast();
        renderPrintableSheets();
      }

      render();
    </script>
  </body>
</html>
